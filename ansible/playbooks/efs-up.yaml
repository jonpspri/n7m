- hosts: "_bastion"
  tasks:

  - name: Get VPC subnets
    amazon.aws.ec2_vpc_subnet_info:
      region: "{{ region_v }}"
      filters:
        "tag:Project": "{{ prefix_v }}"
        "map-public-ip-on-launch": false
      access_key: "{{ access_key_v }}"
      secret_key: "{{ secret_key_v }}"
    register: vpc_private_subnet_f

  - name: Get Bastion Security Group
    amazon.aws.ec2_security_group_info:
      region: "{{ region_v }}"
      filters:
          "tag:Name": "{{ prefix_v }}-bastion-sg"
      access_key: "{{ access_key_v }}"
      secret_key: "{{ secret_key_v }}"
    register: vpc_sg_f

  - name: Create EFS targets list
    ansible.builtin.set_fact:
      efs_targets_f: "{{ (efs_targets_f | default([]) ) + 
        [ { 'subnet_id': item, 'security_groups': [ vpc_sg_f.security_groups[0].group_id ] } ] 
        }}"
    loop: "{{ vpc_private_subnet_f.subnets | map(attribute='id') }}"

  - name: Allocate /data EFS partition
    community.aws.efs:
      region: "{{ region_v }}"
      state: "present"
      name: "{{ prefix_v }}-data"
      targets: "{{ efs_targets_f }}"
      access_key: "{{ access_key_v }}"
      secret_key: "{{ secret_key_v }}"
    register: efs_data_r

